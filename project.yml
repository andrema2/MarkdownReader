name: MarkEdit
options:
  bundleIdPrefix: com.andrema2
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  MarkEdit:
    type: application
    platform: macOS
    sources:
      - path: MarkdownReader
        excludes:
          - Resources
      - path: MarkdownReader/Resources/highlight
        buildPhase: resources
        type: folder
      - path: MarkdownReader/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrema2.MarkEdit
        PRODUCT_NAME: MarkEdit
        INFOPLIST_FILE: MarkdownReader/Info.plist
        CODE_SIGN_ENTITLEMENTS: MarkdownReader/MarkdownReader.entitlements
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
  MarkEditTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MarkEditTests
    dependencies:
      - target: MarkEdit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrema2.MarkEditTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MarkEdit.app/Contents/MacOS/MarkEdit"
        BUNDLE_LOADER: "$(TEST_HOST)"
